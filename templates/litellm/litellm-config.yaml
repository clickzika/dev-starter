# LiteLLM Proxy Configuration
# DevStarter — Multi-Provider AI Support
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# Usage:
#   litellm --config ~/.claude/templates/litellm/litellm-config.yaml --port 4000
#   # or via Docker:
#   docker run -v $(pwd)/litellm-config.yaml:/app/config.yaml \
#     -p 4000:4000 ghcr.io/berriai/litellm:main --config /app/config.yaml

model_list:

  # ─── Anthropic (Claude) ──────────────────────────────────────────────────
  - model_name: claude-sonnet          # Alias used by your application
    litellm_params:
      model: claude-sonnet-4-6         # Actual model ID
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ─── OpenAI ──────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── Google Gemini ────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY

  # ─── Azure OpenAI ────────────────────────────────────────────────────────
  # - model_name: azure-gpt4
  #   litellm_params:
  #     model: azure/{{AZURE_DEPLOYMENT_NAME}}
  #     api_base: os.environ/AZURE_OPENAI_ENDPOINT
  #     api_key: os.environ/AZURE_OPENAI_API_KEY
  #     api_version: "2025-01-01"

  # ─── AWS Bedrock ─────────────────────────────────────────────────────────
  # - model_name: bedrock-claude
  #   litellm_params:
  #     model: bedrock/anthropic.claude-sonnet-4-6-v2
  #     aws_region_name: os.environ/AWS_REGION

  # ─── Local / Ollama ──────────────────────────────────────────────────────
  # - model_name: llama3
  #   litellm_params:
  #     model: ollama/llama3.2
  #     api_base: http://localhost:11434

  # ─── Load Balancing Group ────────────────────────────────────────────────
  # Routes to cheapest available provider with fallback
  - model_name: default
    litellm_params:
      model: claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

# ─── Router Settings ──────────────────────────────────────────────────────────
router_settings:
  routing_strategy: cost-based-routing    # cheapest-model-first (production cost savings)
  # Options: simple-shuffle | least-busy | latency-based-routing | cost-based-routing
  fallbacks:
    - claude-sonnet:
        - gpt-4o
    - claude-haiku:
        - gpt-4o-mini

# ─── General Settings ─────────────────────────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # API key to access this proxy
  database_url: os.environ/DATABASE_URL       # Optional: PostgreSQL for usage logging

# ─── Proxy Settings ───────────────────────────────────────────────────────────
litellm_settings:
  drop_params: true           # Ignore unsupported params (cross-provider compatibility)
  request_timeout: 60
  num_retries: 3
  context_window_fallbacks:   # Automatically switch when context limit exceeded
    - claude-sonnet:
        - claude-haiku

# ─── Logging ──────────────────────────────────────────────────────────────────
