# devstarter-config.yml — DevStarter Project Configuration
# This is the single source of truth for all project settings.
# Edit this file. Never edit .project.env directly — it is auto-generated.
# Secrets (API keys, tokens) go in .env — never here.
#
# After editing: run `devstarter-config-sync` to regenerate .project.env
# See: sdlc/devstarter-config-sync.md

project:
  name: DevStarter
  description: "A complete development workflow system for Claude Code"
  version: "1.6.1"         # mirrors VERSION file
  status: active           # active | archived | migrating | maintenance
  type: framework          # app | api | framework | library | mobile | ml
  language: "markdown+bash"

vcs:
  type: github             # github | gitlab | svn | none
  repo: clickzika/dev-starter-dev
  branch_strategy: gitflow # gitflow | trunk | simple | svn-standard
  main_branch: main
  dev_branch: develop
  secondary_1: none        # none | github | gitlab | svn
  secondary_2: none
  sync_branches: "main develop"

pm:
  type: github-issues      # notion | jira | github-issues | gitlab-issues | linear | trello | none
  notion_database_id: "339d9f1f-cda1-815b-9b47-c9c6f5a8e54b"
  notion_board_url: "https://www.notion.so/339d9f1fcda1815b9b47c9c6f5a8e54b"

ci:
  type: github-actions     # github-actions | gitlab-ci | jenkins | azure-pipelines | none

secrets:
  backend: env-file        # env-file | vault | aws-secrets-manager | azure-keyvault | gcp-secret-manager

ai:
  provider: claude         # claude | litellm | openai | gemini | local
  model: claude-sonnet-4-6
  # For LiteLLM proxy: provider: litellm, provider_url: http://localhost:4000

model_management:
  # Model IDs — update here when Anthropic releases new versions
  haiku:  claude-haiku-4-5-20251001    # Fast + cheap — mechanical tasks
  sonnet: claude-sonnet-4-6            # Balanced   — standard dev workflows
  opus:   claude-opus-4-6              # Most capable — complex reasoning

  # Switch model in Claude Code: /model haiku | /model sonnet | /model opus
  # Each SDLC runbook also declares its recommended tier in a ## Model: header.
  command_tiers:
    opus:
      - devstarter-audit      # Security review, architecture analysis
      - devstarter-hotfix     # Critical production bug fixes
      - devstarter-incident   # Incident root cause + post-mortem
      - devstarter-migrate    # Stack migration decisions
      - devstarter-consult    # Nuanced trade-off analysis
    sonnet:
      - devstarter-new        # Scaffold new project
      - devstarter-change     # Feature / fix / remove
      - devstarter-existing   # Onboard existing repo
      - devstarter-release    # CHANGELOG, version bump, deploy
      - devstarter-sprint     # Sprint planning + Notion tasks
      - devstarter-document   # Generate HTML docs
      - devstarter-onboard    # Team onboarding plan
      - devstarter-handover   # Project handover docs
      - devstarter-retro      # Retrospective writeup
      - devstarter-dependency # Dependency upgrade analysis
      - devstarter-rollback   # Rollback workflow
      - devstarter-monitor    # Monitoring setup plan
    haiku:
      - devstarter-context    # Context refresh (file reads only)
      - devstarter-menu       # Menu + routing display
      - devstarter-export     # File archive / copy
      - devstarter-import     # File restore
      - devstarter-env        # .env file generation
      - devstarter-secrets    # Secrets template rendering

team:
  skill_level: expert      # beginner | intermediate | advanced | expert
  size: solo               # solo | small (2-5) | medium (6-15) | large (15+)
